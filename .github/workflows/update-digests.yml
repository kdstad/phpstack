name: Update Dockerfile Digests

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  update:
    name: Update base image digests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4

      - name: Update pinned digests
        id: update
        run: |
          set -euo pipefail
          changed=false

          update_file() {
            local file="$1"
            echo "Processing $file"

            while IFS= read -r line; do
              local image_ref=""

              if [[ "$line" =~ ^#\ syntax= ]]; then
                image_ref="${line#\# syntax=}"
              elif [[ "$line" =~ ^FROM\  ]]; then
                image_ref="${line#FROM }"
              else
                continue
              fi

              # Only process lines with pinned digests
              [[ "$image_ref" == *"@sha256:"* ]] || continue

              local image_tag old_digest new_digest
              image_tag="${image_ref%%@sha256:*}"
              old_digest="sha256:${image_ref##*@sha256:}"

              new_digest=$(crane digest "$image_tag" 2>/dev/null || true)
              if [[ -z "$new_digest" ]]; then
                echo "  WARNING: could not resolve $image_tag, skipping"
                continue
              fi

              if [[ "$new_digest" == "$old_digest" ]]; then
                echo "  Up to date: $image_tag"
                continue
              fi

              # Use | as sed delimiter to safely handle : / . in image refs
              sed -i "s|${image_tag}@${old_digest}|${image_tag}@${new_digest}|g" "$file"
              echo "  Updated $image_tag"
              echo "    old: $old_digest"
              echo "    new: $new_digest"
              changed=true
            done < "$file"
          }

          update_file "8.1-fpm/Dockerfile"
          update_file "8.5-fpm/Dockerfile"
          update_file "httpd/Dockerfile"

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update base image digests'
          title: 'chore: update base image digests'
          body: |
            Automated monthly base image digest update.

            Updates pinned `@sha256:` digests in all Dockerfiles to the latest digest
            for the same image tag. Tag names are never changed — patch and digest
            updates only (no minor or major version bumps).
          branch: update/base-image-digests
          delete-branch: true
          labels: dependencies
