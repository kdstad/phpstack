name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
#          - context: 8.1-fpm
#            tag: ghcr.io/kdstad/phpstack:8.1-fpm
          - context: 8.5-fpm
            tag: ghcr.io/kdstad/phpstack:8.5-fpm
          - context: httpd
            tag: ghcr.io/kdstad/phpstack:httpd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            changed:
              - '${{ matrix.context }}/**'

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.tag }}
